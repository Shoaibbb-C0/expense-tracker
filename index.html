<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- Header -->
    <div class="header">
        <span class="header-icon">💰</span>
        <h1>Expense Tracker</h1>
        <p>Keep track of where your money goes</p>
    </div>

    <!-- Summary Cards -->
    <div class="summary-row">
        <div class="summary-card primary">
            <span class="summary-label">Total Spent</span>
            <span class="summary-value" id="totalSpent">₹0.00</span>
        </div>
        <div class="summary-card">
            <span class="summary-label">Expenses</span>
            <span class="summary-value" id="expenseCount">0</span>
        </div>
        <div class="summary-card">
            <span class="summary-label">Average</span>
            <span class="summary-value" id="avgExpense">₹0.00</span>
        </div>
    </div>

    <!-- Add Expense Form -->
    <div class="card">
        <div class="card-title">
            <span>✏️</span> Add New Expense
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="amountInput">Amount (₹)</label>
                <input type="number" id="amountInput"
                       placeholder="0.00" min="0.01" step="0.01">
            </div>
            <div class="form-group">
                <label for="categorySelect">Category</label>
                <select id="categorySelect">
                    <option value="">Select category...</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="descInput">Description (optional)</label>
            <input type="text" id="descInput"
                   placeholder="What was this expense for?">
        </div>

        <button class="add-btn" id="addBtn">+ Add Expense</button>
        <p class="error-msg" id="errorMsg"></p>
    </div>

    <!-- Expense List -->
    <div class="card">

        <!-- Search & Filter Bar -->
        <div class="search-filter-bar">

    <!-- Search (unchanged) -->
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input"
               id="searchInput" placeholder="Search expenses...">
        <button class="search-clear hidden"
                id="searchClear">&times;</button>
    </div>

    <!-- Category filter (unchanged) -->
    <select class="filter-dropdown" id="filterDropdown">
        <option value="All">All Categories</option>
    </select>

    <!-- NEW: Sort dropdown -->
    <select class="sort-dropdown" id="sortDropdown">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="amount-desc">Highest amount</option>
        <option value="amount-asc">Lowest amount</option>
        <option value="category-asc">Category A→Z</option>
        <option value="category-desc">Category Z→A</option>
    </select>

</div>

        <!-- Results Info -->
        <div class="results-info" id="resultsInfo" style="display:none">
            <span class="results-count" id="resultsCount"></span>
            <button class="clear-filters-btn hidden"
                    id="clearFiltersBtn">Clear filters</button>
        </div>

        <!-- Filter Tabs -->
        <div class="list-header">
            <div class="filter-tabs" id="filterTabs"></div>
            <button class="clear-all-btn" id="clearAllBtn"
                    style="display:none">Clear All</button>
        </div>

        <!-- List Container -->
        <div class="expense-list" id="expenseList"></div>

        <!-- Total Bar -->
        <div id="totalBar"></div>
    </div>

    <!-- Category Breakdown -->
    <div class="card" id="breakdownCard" style="display:none">
        <div class="card-title">
            <span>📊</span> Spending by Category
        </div>
        <div id="breakdownList"></div>
    </div>

        <!-- Time Summary (NEW) -->
    <div class="card" id="timeSummaryCard" style="display:none">
        <div class="card-title">
            <span>📅</span> Time Summary
        </div>
        <div class="time-summary-row" id="timeSummaryContent"></div>
    </div>

    <!-- Save Status -->
    <div class="save-status" id="saveStatus"></div>

</div>

<script src="script.js"></script>
</body>
</html>
